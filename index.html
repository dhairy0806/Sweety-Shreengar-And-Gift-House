<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweety Gift & Shreengar House</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px); 
            padding: 1rem 0; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .header-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 1rem;
        }
        .logo { 
            font-size: 1.8rem; 
            font-weight: 700; 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text;
        }
        .cart-info { 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            color: white; 
            padding: 0.5rem 1.5rem; 
            border-radius: 50px; 
            font-weight: 600;
        }
        
        /* Hero */
        .hero { 
            text-align: center; 
            padding: 4rem 0; 
            color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.3rem; margin-bottom: 2rem; opacity: 0.95; }
        .shop-btn { 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            color: white; 
            padding: 1rem 2.5rem; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
            box-shadow: 0 10px 30px rgba(255,107,157,0.4);
        }
        .shop-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,107,157,0.6); }
        
        /* Products */
        .products { padding: 4rem 0; }
        .section-title { 
            text-align: center; 
            font-size: 2.5rem; 
            margin-bottom: 3rem; 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text;
        }
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 2rem; 
        }
        .product-card { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 2rem; 
            text-align: center; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            transition: all 0.3s; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .product-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.15); 
        }
        .product-icon { 
            font-size: 4rem; 
            margin-bottom: 1rem; 
            background: linear-gradient(45deg, #ff9a9e, #fecfef); 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 1rem;
            box-shadow: 0 10px 30px rgba(255,154,158,0.4);
        }
        .product-card h3 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #333; }
        .product-price { 
            font-size: 2rem; 
            font-weight: 700; 
            color: #c44569; 
            margin: 1rem 0; 
        }
        .add-cart-btn { 
            width: 100%; 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            color: white; 
            border: none; 
            padding: 1rem; 
            border-radius: 15px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .add-cart-btn:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(255,107,157,0.4); }
        
        /* Cart Modal */
        .cart-modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .cart-content { 
            background: white; 
            padding: 2rem; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
            max-height: 80vh; 
            overflow-y: auto; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .close-cart { 
            float: right; 
            font-size: 2rem; 
            cursor: pointer; 
            color: #999; 
        }
        .close-cart:hover { color: #333; }
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1rem 0; 
            border-bottom: 1px solid #eee; 
        }
        .cart-total { 
            font-size: 1.5rem; 
            font-weight: 700; 
            text-align: center; 
            margin: 2rem 0 1rem; 
            color: #c44569;
        }
        .checkout-btn { 
            width: 100%; 
            background: linear-gradient(45deg, #28a745, #20c997); 
            color: white; 
            border: none; 
            padding: 1.2rem; 
            border-radius: 15px; 
            font-size: 1.2rem; 
            font-weight: 600; 
            cursor: pointer; 
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .products-grid { grid-template-columns: 1fr; }
            .header-content { flex-direction: column; text-align: center; }
        }
        
        .notification { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            background: #28a745; 
            color: white; 
            padding: 1rem 2rem; 
            border-radius: 10px; 
            transform: translateX(400px); 
            transition: all 0.3s; 
            z-index: 2000;
        }
        .notification.show { transform: translateX(0); }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    🎁 Sweety Gift & Shreengar House ✨
                </div>
                <div class="cart-info" onclick="toggleCart()">
                    🛒 Cart (<span id="cartCount">0</span>) | Total: $<span id="cartTotal">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <h1>Beautiful Gifts & Premium Beauty Products</h1>
            <p>Make every moment special with our handpicked collection</p>
            <button class="shop-btn" onclick="scrollToProducts()">Start Shopping</button>
        </div>
    </section>

    <!-- Products -->
    <section class="products" id="productsSection">
        <div class="container">
            <h2 class="section-title">🎀 Our Collection</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Products load here -->
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <span class="close-cart" onclick="toggleCart()">&times;</span>
            <h2>🛒 Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total">Total: $<span id="modalTotal">0</span></div>
            <button class="checkout-btn" onclick="checkout()">💳 Checkout & Pay</button>
            <p style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.9rem;">
                *Demo mode - Replace with real payment later
            </p>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script>
        // 🔥 YOUR PRODUCTS (Edit these easily)
        const products = [
            { id: 1, name: "Rose Gold Necklace", price: 29.99, icon: "💍", desc: "Elegant heart pendant", category: "Gifts" },
            { id: 2, name: "Luxury Gift Hamper", price: 49.99, icon: "🎁", desc: "Chocolates + Wine", category: "Gifts" },
            { id: 3, name: "Pearl Earrings", price: 39.99, icon: "👂", desc: "Classic studs", category: "Gifts" },
            { id: 4, name: "Vitamin C Serum", price: 24.99, icon: "💧", desc: "Glow boost", category: "Beauty" },
            { id: 5, name: "Matte Lipstick Set", price: 19.99, icon: "💄", desc: "5 shades", category: "Beauty" },
            { id: 6, name: "Gold Bracelet", price: 59.99, icon: "✨", desc: "Charm bracelet", category: "Gifts" },
            { id: 7, name: "Hair Growth Oil", price: 22.99, icon: "🧴", desc: "Ayurvedic", category: "Beauty" },
            { id: 8, name: "Custom Photo Mug", price: 15.99, icon: "☕", desc: "Personalized", category: "Gifts" },
            { id: 9, name: "Eye Palette", price: 34.99, icon: "🎨", desc: "10 shades", category: "Beauty" },
            { id: 10, name: "Floral Perfume", price: 44.99, icon: "🌹", desc: "Long-lasting", category: "Beauty" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Load products
        function loadProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-icon">${product.icon}</div>
                    <h3>${product.name}</h3>
                    <p>${product.desc}</p>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                    <button class="add-cart-btn" onclick="addToCart(${product.id})">
                        Add to Cart
                    </button>
                </div>
            `).join('');
        }

        // Add to cart
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartDisplay();
            showNotification(`${product.name} added to cart!`);
        }

        // Update cart display
        function updateCartDisplay() {
            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            
            document.getElementById('cartCount').textContent = totalItems;
            document.getElementById('cartTotal').textContent = totalPrice.toFixed(2);
        }

        // Toggle cart modal
        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
            if (modal.style.display === 'flex') renderCart();
        }

        // Render cart items
        function renderCart() {
            const container = document.getElementById('cartItems');
            const total = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;">Your cart is empty 😊</p>';
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <span>${item.icon} ${item.name}</span>
                        <div>
                            <strong>$${ (item.price * (item.quantity || 1)).toFixed(2) }</strong>
                            <br><small>Qty: ${item.quantity || 1}</small>
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('modalTotal').textContent = total.toFixed(2);
        }

        // Checkout (Demo)
        function checkout() {
            if (cart.length === 0) return;
            
            const total = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            alert(`🎉 Order placed successfully!\nTotal: $${total.toFixed(2)}\n\nCheck your email for order confirmation!\n\n(Replace this with real payment gateway later)`);
            
            // Clear cart
            cart = [];
            localStorage.removeItem('cart');
            updateCartDisplay();
            toggleCart();
            showNotification('Order confirmed! Thank you! ❤️');
        }

        // Notification
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // Scroll to products
        function scrollToProducts() {
            document.getElementById('productsSection').scrollIntoView({ behavior: 'smooth' });
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('cartModal');
            if (event.target === modal) toggleCart();
        }

        // Initialize
        loadProducts();
        updateCartDisplay();
    </script>
</body>
</html>
